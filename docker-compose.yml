services:
  neo4j:
    image: neo4j:5-community
    container_name: freight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 12

  postgres:
    image: postgres:16
    container_name: freight-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: freight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freight"]
      interval: 5s
      timeout: 5s
      retries: 12

  seed-loader:
    build: .
    container_name: freight-seed-loader
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    command:
      [
        "python",
        "data/migration/scripts/load_seed_graph.py",
        "data/seed data logistics.json",
        "--clear",
      ]

  api:
    build: .
    container_name: freight-api
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      FREIGHT_SEED_DATA_PATH: "data/seed data logistics.json"
    volumes:
      - ./observability:/app/observability

volumes:
  neo4j_data:
  postgres_data:
